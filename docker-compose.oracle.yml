# Nova — Oracle Cloud Always Free Tier
# Compact profile (default): ~1.6 GB container RAM budget
# Standard profile: docker compose -f docker-compose.oracle.yml --profile standard up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: nova-postgres-oracle
    environment:
      POSTGRES_DB: nova_db
      POSTGRES_USER: nova_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    command: >
      postgres
      -c shared_buffers=64MB
      -c effective_cache_size=128MB
      -c maintenance_work_mem=32MB
      -c max_connections=50
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - nova-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nova_user -d nova_db"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: nova-redis-oracle
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
      --maxmemory 80mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - nova-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 96M

  neko:
    image: m1k1o/neko:firefox
    container_name: nova-neko-oracle
    environment:
      NEKO_PASSWORD: ${NEKO_PASSWORD:?Set NEKO_PASSWORD}
      NEKO_ADMIN_PASSWORD: ${NEKO_ADMIN_PASSWORD:?Set NEKO_ADMIN_PASSWORD}
      NEKO_SCREEN: "1280x720@30"
    restart: unless-stopped
    networks:
      - nova-internal
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nova-backend-oracle
    env_file:
      - ./backend/.env
    environment:
      DEPLOY_PROFILE: oracle
      DATABASE_URL: postgresql://nova_user:${POSTGRES_PASSWORD}@postgres:5432/nova_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      NEKO_URL: http://neko:8080
      ENVIRONMENT: production
      DEBUG: "False"
      TRUST_PROXY_HEADERS: "True"
      UVICORN_WORKERS: "1"
      DB_POOL_SIZE: "5"
      DB_MAX_OVERFLOW: "5"
      LOG_LEVEL: WARNING
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nova-internal
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/readiness"]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 384M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:?Set NEXT_PUBLIC_WS_URL}
        NEXT_PUBLIC_APP_ENV: production
    container_name: nova-frontend-oracle
    restart: unless-stopped
    networks:
      - nova-internal
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 35s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  nginx:
    image: nginx:1.27-alpine
    container_name: nova-nginx-oracle
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nova-internal
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

networks:
  nova-internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data: