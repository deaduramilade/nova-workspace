# Nova Production Stack
# Usage:
#   1. cp deploy/production.env.template backend/.env  (fill in secrets)
#   2. python deploy/generate_secrets.py
#   3. docker compose -f docker-compose.prod.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: nova-postgres-prod
    environment:
      POSTGRES_DB: nova_db
      POSTGRES_USER: nova_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - nova-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nova_user -d nova_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nova-redis-prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - nova-internal

  neko:
    image: m1k1o/neko:firefox
    container_name: nova-neko-prod
    environment:
      NEKO_PASSWORD: ${NEKO_PASSWORD:?Set NEKO_PASSWORD}
      NEKO_ADMIN_PASSWORD: ${NEKO_ADMIN_PASSWORD:?Set NEKO_ADMIN_PASSWORD}
    restart: unless-stopped
    networks:
      - nova-internal
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nova-backend-prod
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://nova_user:${POSTGRES_PASSWORD}@postgres:5432/nova_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      NEKO_URL: http://neko:8080
      ENVIRONMENT: production
      DEBUG: "False"
      TRUST_PROXY_HEADERS: "True"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - nova-internal
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://your-domain.com/api/v1}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-wss://your-domain.com}
        NEXT_PUBLIC_APP_ENV: production
    container_name: nova-frontend-prod
    restart: unless-stopped
    networks:
      - nova-internal
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: nova-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - nova-internal

networks:
  nova-internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data: