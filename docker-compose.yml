version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nova-postgres
    environment:
      POSTGRES_DB: nova_db
      POSTGRES_USER: nova_user
      POSTGRES_PASSWORD: nova_secure_password
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    mem_limit: 512m

  redis:
    image: redis:7-alpine
    container_name: nova-redis
    volumes:
      - ./volumes/redis:/data
    restart: unless-stopped
    mem_limit: 256m

  neko:
    image: m1k1o/neko:firefox
    container_name: nova-neko
    environment:
      NEKO_PASSWORD: nova
      NEKO_ADMIN_PASSWORD: admin
    ports:
      - "5210:5210"
    restart: unless-stopped
    mem_limit: 768m

  ollama:
    image: ollama/ollama
    container_name: nova-ollama
    volumes:
      - ./volumes/ollama:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    mem_limit: 2g

  backend:
    build: ./backend
    container_name: nova-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://nova_user:nova_secure_password@postgres:5432/nova_db
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    mem_limit: 768m
    volumes:
      - ./backend:/app

volumes:
  postgres:
  redis:
  ollama: