version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nova-postgres
    environment:
      POSTGRES_DB: nova_db
      POSTGRES_USER: nova_user
      POSTGRES_PASSWORD: nova_secure_password
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    ports:
      - "5432:5432"          # ← This was missing
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: nova-redis
    volumes:
      - ./volumes/redis:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  neko:
    image: m1k1o/neko:firefox
    container_name: nova-neko
    environment:
      NEKO_PASSWORD: nova
      NEKO_ADMIN_PASSWORD: admin
    ports:
      - "5210:8080"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M

  ollama:
    image: ollama/ollama
    container_name: nova-ollama
    volumes:
      - ./volumes/ollama:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G

volumes:
  postgres:
  redis:
  ollama: